# Test Suite: Performance Testing
name: "Performance - Authentication Flows"
tags:
  - performance
  - auth

steps:
  # Test app launch time
  - launchApp
  - assertVisible: "Welcome to StyleAI"
    timeout: 3000
  
  # Test registration performance
  - tapOn: "Get Started"
  - assertVisible: "Create Account"
    timeout: 1000
  
  # Fill form quickly
  - tapOn: "Email"
  - inputText: "perf.test@example.com"
  - tapOn: "Password"
  - inputText: "SecurePassword123!"
  - tapOn: "Confirm Password"
  - inputText: "SecurePassword123!"
  - tapOn: "Display Name"
  - inputText: "Performance Test"
  - tapOn: "I agree to the Terms of Service"
  - tapOn: "I agree to the Privacy Policy"
  
  # Test registration submission time
  - tapOn: "Create Account"
  - assertVisible: "Account Created!"
    timeout: 5000
  
  # Test login performance
  - tapOn: "Continue"
  - tapOn: "Sign In Instead"
  - tapOn: "Email"
  - inputText: "verified.user@example.com"
  - tapOn: "Password"
  - inputText: "SecurePassword123!"
  - tapOn: "Sign In"
  - assertVisible: "Home"
    timeout: 3000

---
# Test Suite: Network Error Handling
name: "Network Errors - Authentication Flows"
tags:
  - network
  - error-handling
  - auth

steps:
  # Test offline registration
  - setNetworkCondition: offline
  - launchApp
  - tapOn: "Get Started"
  - tapOn: "Email"
  - inputText: "offline.test@example.com"
  - tapOn: "Password"
  - inputText: "SecurePassword123!"
  - tapOn: "Confirm Password"
  - inputText: "SecurePassword123!"
  - tapOn: "Display Name"
  - inputText: "Offline Test"
  - tapOn: "I agree to the Terms of Service"
  - tapOn: "I agree to the Privacy Policy"
  - tapOn: "Create Account"
  
  # Verify offline error
  - assertVisible: "No Internet Connection"
  - assertVisible: "Please check your internet connection and try again"
  - assertVisible: "Retry"
  - assertVisible: "Save for Later"
  
  # Test network recovery
  - setNetworkCondition: online
  - tapOn: "Retry"
  - assertVisible: "Account Created!"
    timeout: 10000

---
# Test Suite: Security Testing
name: "Security - Authentication Flows"
tags:
  - security
  - auth

steps:
  # Test password visibility toggle
  - launchApp
  - tapOn: "Sign In"
  - tapOn: "Password"
  - inputText: "SecurePassword123!"
  - assertVisible: "••••••••••••••••••"
  
  # Toggle password visibility
  - tapOn: "Show Password"
  - assertVisible: "SecurePassword123!"
  - tapOn: "Hide Password"
  - assertVisible: "••••••••••••••••••"
  
  # Test auto-logout on background
  - tapOn: "Email"
  - inputText: "verified.user@example.com"
  - tapOn: "Sign In"
  - assertVisible: "Home"
  
  # Simulate app backgrounding
  - sendToBackground: 300000  # 5 minutes
  - assertVisible: "Session Expired"
  - assertVisible: "For your security, you have been signed out"
  - assertVisible: "Sign In Again"