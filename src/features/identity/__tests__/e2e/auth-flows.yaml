---
# Test Suite: User Login - Account Lockout
name: "User Login - Account Lockout"
tags:
  - auth
  - login
  - account-lockout
  - security

steps:
  # Navigate to login screen
  - launchApp
  - tapOn: "Sign In"
  - assertVisible: "Welcome Back"
  
  # Attempt multiple failed logins
  - tapOn: "Email"
  - inputText: "test.user@example.com"
  
  # First failed attempt
  - tapOn: "Password"
  - inputText: "WrongPassword1!"
  - tapOn: "Sign In"
  - assertVisible: "Invalid email or password"
  
  # Second failed attempt
  - clearText
  - tapOn: "Password"
  - inputText: "WrongPassword2!"
  - tapOn: "Sign In"
  - assertVisible: "Invalid email or password"
  
  # Third failed attempt
  - clearText
  - tapOn: "Password"
  - inputText: "WrongPassword3!"
  - tapOn: "Sign In"
  - assertVisible: "Invalid email or password"
  
  # Fourth failed attempt
  - clearText
  - tapOn: "Password"
  - inputText: "WrongPassword4!"
  - tapOn: "Sign In"
  - assertVisible: "Invalid email or password"
  
  # Fifth failed attempt should trigger lockout
  - clearText
  - tapOn: "Password"
  - inputText: "WrongPassword5!"
  - tapOn: "Sign In"
  - assertVisible: "Account Temporarily Locked"
  - assertVisible: "Too many failed login attempts. Please try again in 15 minutes or reset your password."
  - assertVisible: "Reset Password"
  - assertVisible: "Try Again Later"

