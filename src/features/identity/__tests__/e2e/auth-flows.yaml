# Maestro E2E Test Flows for Identity Domain
# These test scenarios define end-to-end authentication flows

appId: com.styleai.app

---
# Test Suite: User Registration Flow
name: "User Registration - Happy Path"
tags:
  - auth
  - registration
  - happy-path

steps:
  # Navigate to registration screen
  - launchApp
  - assertVisible: "Welcome to StyleAI"
  - tapOn: "Get Started"
  - assertVisible: "Create Account"
  
  # Fill registration form
  - tapOn: "Email"
  - inputText: "test.user@example.com"
  - tapOn: "Password"
  - inputText: "SecurePassword123!"
  - tapOn: "Confirm Password"
  - inputText: "SecurePassword123!"
  - tapOn: "Display Name"
  - inputText: "Test User"
  - tapOn: "First Name"
  - inputText: "Test"
  - tapOn: "Last Name"
  - inputText: "User"
  
  # Accept terms and privacy
  - tapOn: "I agree to the Terms of Service"
  - tapOn: "I agree to the Privacy Policy"
  
  # Submit registration
  - tapOn: "Create Account"
  
  # Verify registration success
  - assertVisible: "Account Created!"
  - assertVisible: "Please check your email to verify your account"
  - assertVisible: "Continue"
  - tapOn: "Continue"
  
  # Verify navigation to email verification screen
  - assertVisible: "Verify Your Email"
  - assertVisible: "test.user@example.com"
  - assertVisible: "Resend Verification Email"

---
# Test Suite: User Registration - Validation Errors
name: "User Registration - Validation Errors"
tags:
  - auth
  - registration
  - validation
  - error-handling

steps:
  # Navigate to registration screen
  - launchApp
  - tapOn: "Get Started"
  - assertVisible: "Create Account"
  
  # Test empty form submission
  - tapOn: "Create Account"
  - assertVisible: "Email is required"
  - assertVisible: "Password is required"
  - assertVisible: "Display Name is required"
  
  # Test invalid email
  - tapOn: "Email"
  - inputText: "invalid-email"
  - tapOn: "Create Account"
  - assertVisible: "Please enter a valid email address"
  
  # Test weak password
  - clearText
  - tapOn: "Email"
  - inputText: "test@example.com"
  - tapOn: "Password"
  - inputText: "123"
  - tapOn: "Create Account"
  - assertVisible: "Password must be at least 8 characters"
  
  # Test password mismatch
  - clearText
  - tapOn: "Password"
  - inputText: "SecurePassword123!"
  - tapOn: "Confirm Password"
  - inputText: "DifferentPassword123!"
  - tapOn: "Create Account"
  - assertVisible: "Passwords do not match"
  
  # Test missing terms acceptance
  - clearText
  - tapOn: "Password"
  - inputText: "SecurePassword123!"
  - tapOn: "Confirm Password"
  - inputText: "SecurePassword123!"
  - tapOn: "Display Name"
  - inputText: "Test User"
  - tapOn: "Create Account"
  - assertVisible: "You must accept the Terms of Service"
  
  # Test missing privacy policy acceptance
  - tapOn: "I agree to the Terms of Service"
  - tapOn: "Create Account"
  - assertVisible: "You must accept the Privacy Policy"

