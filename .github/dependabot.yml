version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "styleai-team"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore"
      include: "scope"
    pull-request-branch-name:
      separator: "-"
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      expo:
        patterns:
          - "expo*"
          - "@expo/*"
      firebase:
        patterns:
          - "firebase"
          - "@react-native-firebase/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "jest*"
          - "@types/jest"
      dev-tools:
        patterns:
          - "eslint*"
          - "prettier*"
          - "husky"
          - "lint-staged"
          - "@typescript-eslint/*"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"